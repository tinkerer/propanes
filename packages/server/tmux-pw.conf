# tmux configuration for propanes browser PTY sessions
# Mouse is OFF so xterm.js in the browser handles scrollback and text
# selection natively. Tradeoff: mouse-aware TUI apps (vim, htop, fzf)
# won't receive mouse events — but these sessions mostly run Claude Code
# and shell commands where browser-native scroll/select matters more.

set -g mouse off

# Forward pane title changes to attached clients as OSC sequences
# (Claude Code state detection relies on this)
set -g set-titles on
set -g set-titles-string "#{pane_title}"

# Disable status bar for embedded terminals
set -g status off

# Large scrollback for capture-pane recovery on reconnect
set -g history-limit 50000

# Pass through OSC sequences (clipboard, hyperlinks, etc.) to the PTY client
set -g allow-passthrough on

# Ensure 256-color + true-color support
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
