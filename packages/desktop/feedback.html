<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProPanes Feedback</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; }
      body {
        background: rgba(15, 23, 42, 0.95);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #e2e8f0;
        border-radius: 12px;
      }
      .fb-header {
        padding: 16px;
        font-size: 14px;
        font-weight: 600;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        -webkit-user-select: none;
        cursor: grab;
      }
      .fb-body {
        padding: 16px;
        height: calc(100% - 49px);
        overflow-y: auto;
      }
      .fb-body p {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="fb-header" data-tauri-drag-region>Feedback</div>
    <div class="fb-body">
      <p>The ProPanes widget will load here, connecting to the server for feedback submission.</p>
    </div>
    <script>
      // Load the widget from the server
      (function() {
        const serverUrl = localStorage.getItem('propanes-server-url') || 'http://localhost:3001';
        const s = document.createElement('script');
        s.src = serverUrl + '/widget/propanes.js';
        s.dataset.serverUrl = serverUrl;
        s.dataset.appId = 'propanes-desktop';
        document.head.appendChild(s);
      })();

      // Drag support — startDragging works on borderless windows
      document.querySelector('.fb-header').addEventListener('mousedown', async () => {
        const { getCurrentWindow } = window.__TAURI__.window;
        await getCurrentWindow().startDragging();
      });

      // Esc hides the panel instead of closing the app
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          e.preventDefault();
          e.stopPropagation();
          window.__TAURI__.core.invoke('toggle_feedback_panel');
        }
      }, true);
    </script>
  </body>
</html>
