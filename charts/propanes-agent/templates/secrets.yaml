{{- if .Values.launcherAuthSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "propanes-agent.launcherAuthSecretName" . }}
  labels:
    {{- include "propanes-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.launcherAuthSecret.key }}: {{ .Values.launcherAuthSecret.token | quote }}
---
{{- end }}
{{- if .Values.agentAuthSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "propanes-agent.agentAuthSecretName" . }}
  labels:
    {{- include "propanes-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  claude-credentials.json: {{ index .Values.agentAuthSecret.data "claude-credentials.json" | default "" | quote }}
  claude-config.json: {{ index .Values.agentAuthSecret.data "claude-config.json" | default "" | quote }}
  codex-auth.json: {{ index .Values.agentAuthSecret.data "codex-auth.json" | default "" | quote }}
  codex-config.toml: {{ index .Values.agentAuthSecret.data "codex-config.toml" | default "" | quote }}
{{- end }}
